        .passed { color: #4CAF50; font-weight: bold; }

        const envSelect = document.getElementById('env-select');
        const latestReportLink = document.getElementById('latest-report-link');
        const summary = document.getElementById('env-summary');
        const tableBody = document.getElementById('history-table-body');

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderHistory(envName) {
            const rows = historyDataByEnv[envName] || [];
            envSelect.value = envName;
            latestReportLink.href = `./${envName}/index.html`;
            summary.textContent = `当前环境: ${envName} | 历史报告数: ${rows.length}`;

            if (!rows.length) {
                tableBody.innerHTML = '<tr><td class="empty" colspan="7">当前环境暂无历史报告</td></tr>';
                return;
            }

            tableBody.innerHTML = rows.map((build) => {
                const buildNumber = escapeHtml(build.build_number || 'N/A');
                const runId = escapeHtml(build.run_id || 'N/A');
                const branch = escapeHtml(build.branch || 'N/A');
                const buildTime = escapeHtml(build.build_time || 'N/A');
                const total = escapeHtml(build.total || 0);
                const passed = escapeHtml(build.passed || 0);
                const failed = escapeHtml(build.failed || 0);
                return `
                    <tr>
                        <td>#${buildNumber}</td>
                        <td>${buildTime}</td>
                        <td>${branch}</td>
                        <td class="total">${total}</td>
                        <td class="passed">${passed}</td>
                        <td class="failed">${failed}</td>
                        <td><a href="./${envName}/reports/${runId}/index.html">查看报告</a></td>
                    </tr>
                `;
            }).join('');
        }
