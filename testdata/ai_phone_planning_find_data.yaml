test_ai_phone_planning_find:
  - name: "查询planning列表成功"
    description: "验证查询planning列表返回正确的数据"
    use_env_token: true
    expected_status_code: 200
    expected_fields:
      page_index: 0
      page_size: 10
    expected_nested_fields:
      items: "__NOT_EMPTY__"
      page_count: "__NOT_NULL__"
      item_count: "__NOT_NULL__"

  - name: "查询planning列表-验证分页参数"
    description: "验证分页参数正确处理"
    use_env_token: true
    expected_status_code: 200
    expected_fields:
      page_index: 0
      page_size: 10

  - name: "查询planning列表-验证items字段不为空"
    description: "验证items字段包含数据"
    use_env_token: true
    expected_status_code: 200
    expected_nested_fields:
      items: "__NOT_EMPTY__"

  - name: "缺少Authorization参数-401"
    description: "验证不带Authorization header时返回401错误"
    use_env_token: false
    expected_status_code: 401
    expected_response:
      name: "unauthorized"
      message: "ログインの有効期限が切れました。再度ログインしてください"
      data: null

  - name: "无效的Authorization-401"
    description: "验证无效的Authorization时返回401错误"
    use_env_token: false
    headers:
      Authorization: "token invalid_token"
    expected_status_code: 401
    expected_response:
      name: "unauthorized"
      message: "ログインの有効期限が切れました。再度ログインしてください"
      data: null

  - name: "查询planning列表-验证响应结构"
    description: "验证响应数据结构完整性"
    use_env_token: true
    expected_status_code: 200
    expected_nested_fields:
      items: "__NOT_EMPTY__"
      page_count: "__NOT_NULL__"
      item_count: "__NOT_NULL__"
