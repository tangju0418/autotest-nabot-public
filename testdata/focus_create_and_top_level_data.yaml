test_focus_create_and_top_level:
  - name: "create_and_top_level接口-创建今日安排成功"
    description: "验证创建今日安排成功"
    use_env_token: true
    endpoint: "/intent-os-mindspace-multi-agent-api/method/api/focus/create_and_top_level"
    data:
      instruction: "今日安排"
    expected_status_code: 201
    expected_response:
      success: true

  - name: "create_and_top_level接口-缺少instruction-400"
    description: "验证缺少instruction时返回400错误"
    use_env_token: true
    endpoint: "/intent-os-mindspace-multi-agent-api/method/api/focus/create_and_top_level"
    data: {}
    expected_status_code: 400
    expected_response:
      success: false
      error: "Instruction is required and must be a non-empty string"

  - name: "create_and_top_level接口-instruction为空-400"
    description: "验证instruction为空时返回400错误"
    use_env_token: true
    endpoint: "/intent-os-mindspace-multi-agent-api/method/api/focus/create_and_top_level"
    data:
      instruction: ""
    expected_status_code: 400
    expected_response:
      error:
        code: "validation_error"
        message: "Validation error: \"instruction\" is not allowed to be empty"

  - name: "create_and_top_level接口-无效的Authorization-401"
    description: "验证无效的Authorization时返回401错误"
    use_env_token: false
    headers:
      Authorization: "token invalid_token"
    endpoint: "/intent-os-mindspace-multi-agent-api/method/api/focus/create_and_top_level"
    data:
      instruction: "今日安排"
    expected_status_code: 401
    expected_response:
      success: false
      error: "無効または期限切れのトークン"
