test_focus_delete:
  - name: "delete接口-删除focus成功"
    description: "验证删除focus成功（先创建后删除）"
    use_env_token: true
    endpoint: "/intent-os-mindspace-multi-agent-api/method/api/focus"
    create_focus_first: true
    expected_status_code: 200
    expected_response:
      success: true

  - name: "delete接口-删除后验证不存在"
    description: "验证删除后再次查询该focus返回404"
    use_env_token: true
    endpoint: "/intent-os-mindspace-multi-agent-api/method/api/focus"
    create_focus_first: true
    verify_after_delete: true
    expected_status_code: 200

  - name: "delete接口-删除不存在的focus_id-404"
    description: "验证删除不存在的focus_id时返回404错误"
    use_env_token: true
    endpoint: "/intent-os-mindspace-multi-agent-api/method/api/focus"
    focus_id: "00000000-0000-0000-0000-000000000000"
    expected_status_code: 404

  - name: "delete接口-无效的focus_id格式-500"
    description: "验证无效的focus_id格式时返回500错误"
    use_env_token: true
    endpoint: "/intent-os-mindspace-multi-agent-api/method/api/focus"
    focus_id: "invalid_focus_id"
    expected_status_code: 500

  - name: "delete接口-无效的Authorization-401"
    description: "验证无效的Authorization时返回401错误"
    use_env_token: false
    headers:
      Authorization: "token invalid_token"
    endpoint: "/intent-os-mindspace-multi-agent-api/method/api/focus"
    focus_id: "b897e118-1d9d-4476-afe2-cc1f7f1e9900"
    expected_status_code: 401
    expected_response:
      success: false
      error: "無効または期限切れのトークン"

  - name: "delete接口-重复删除同一focus-幂等性验证"
    description: "验证重复删除同一focus的幂等性"
    use_env_token: true
    endpoint: "/intent-os-mindspace-multi-agent-api/method/api/focus"
    create_focus_first: true
    delete_twice: true
    expected_status_code: 200
