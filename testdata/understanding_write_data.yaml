test_understanding_write:
  - name: "write接口-写入生日日期成功"
    description: "验证写入生日日期成功"
    use_env_token: true
    endpoint: "/planning-api/method/understanding/write"
    data:
      - scenario_id: ""
        scenario_type: "memory_custom"
        timestamp: ""
        location:
          address: "unknown"
          latitude: 30.5733014
          longitude: 104.0595155
        user_action:
          type: "memory_custom"
          description: "用户添加了记忆 \"我的生日是1月5日\""
    expected_status_code: 200
    expected_fact_contains: "1月5日"

  - name: "write接口-电商场景-订单下单成功"
    description: "验证电商场景下订单下单成功"
    use_env_token: true
    endpoint: "/planning-api/method/understanding/write"
    data:
      - scenario_id: ""
        scenario_type: "ecommerce"
        timestamp: ""
        location:
          latitude: 37.7749
          longitude: -122.4194
          address: "San Francisco, CA"
        user_action:
          type: "place_order"
          description: "User ordered Japanese food from Saki restaurant"
          raw_data:
            restaurant: "Saki"
            cuisine: "Japanese"
            items:
              - "Sushi Roll"
              - "Ramen"
            total: 45.00
            delivery_time: "7:00 PM"
        current_context:
          time_of_day: "evening"
          weather: "rainy"
    expected_status_code: 200
    expected_response: []

  - name: "write接口-user_action为空-400"
    description: "验证user_action为空时返回400错误"
    use_env_token: true
    endpoint: "/planning-api/method/understanding/write"
    data:
      - scenario_id: ""
        scenario_type: "memory_custom"
        timestamp: ""
        user_action: null
    expected_status_code: 400

  - name: "write接口-缺少scenario_type-400"
    description: "验证缺少scenario_type时返回400错误"
    use_env_token: true
    endpoint: "/planning-api/method/understanding/write"
    data:
      - scenario_id: ""
        timestamp: ""
        user_action:
          type: "memory_custom"
          description: "我喜欢吃肉"
    expected_status_code: 400

  - name: "write接口-缺少scenario_id-400"
    description: "验证缺少scenario_id时返回400错误"
    use_env_token: true
    endpoint: "/planning-api/method/understanding/write"
    data:
      - scenario_type: "memory_custom"
        timestamp: ""
        user_action:
          type: "memory_custom"
          description: "我喜欢吃肉"
    expected_status_code: 400
    expected_name: "invalid_request"
    expected_data: null

  - name: "write接口-缺少timestamp-400"
    description: "验证缺少timestamp时返回400错误"
    use_env_token: true
    endpoint: "/planning-api/method/understanding/write"
    data:
      - scenario_id: ""
        scenario_type: "memory_custom"
        user_action:
          type: "memory_custom"
          description: "测试缺少timestamp"
    expected_status_code: 400
    expected_name: "invalid_request"
    expected_data: null

  - name: "write接口-user_action参数错误-400"
    description: "验证user_action参数错误时返回400错误"
    use_env_token: true
    endpoint: "/planning-api/method/understanding/write"
    data:
      - scenario_id: ""
        scenario_type: "memory_custom"
        timestamp: ""
        user_action:
          aa: 231231
    expected_status_code: 400
    expected_name: "invalid_request"
    expected_data: null

  - name: "write接口-无效的Authorization-401"
    description: "验证无效的Authorization时返回401错误"
    use_env_token: false
    headers:
      Authorization: "token invalid_token"
    endpoint: "/planning-api/method/understanding/write"
    data:
      - scenario_id: ""
        scenario_type: "memory_custom"
        timestamp: ""
        user_action:
          type: "memory_custom"
          description: "测试无效Authorization"
    expected_status_code: 401

  - name: "write接口-空数据数组-400"
    description: "验证空数据数组时返回400错误"
    use_env_token: true
    endpoint: "/planning-api/method/understanding/write"
    data: []
    expected_status_code: 400


